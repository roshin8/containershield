<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M64 8 L112 28 L112 60 C112 90 90 110 64 120 C38 110 16 90 16 60 L16 28 Z"
        fill="url(#shieldGradient)"
        stroke="#1E40AF"
        stroke-width="2"/>

  <!-- Container boxes (representing multi-account containers) -->
  <g transform="translate(32, 38)">
    <!-- Top left container -->
    <rect x="0" y="0" width="26" height="26" rx="4" fill="url(#containerGradient)" opacity="0.9"/>

    <!-- Top right container -->
    <rect x="32" y="0" width="26" height="26" rx="4" fill="#F59E0B" opacity="0.9"/>

    <!-- Bottom left container -->
    <rect x="0" y="32" width="26" height="26" rx="4" fill="#EF4444" opacity="0.9"/>

    <!-- Bottom right container -->
    <rect x="32" y="32" width="26" height="26" rx="4" fill="#8B5CF6" opacity="0.9"/>
  </g>

  <!-- Lock icon in center -->
  <g transform="translate(54, 54)">
    <rect x="2" y="8" width="16" height="12" rx="2" fill="white"/>
    <path d="M5 8 L5 4 C5 1.5 7.5 0 10 0 C12.5 0 15 1.5 15 4 L15 8"
          fill="none"
          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"/>
  </g>
</svg>
